databases:
  - name: commplatform-db
    plan: free
    databaseName: commplatform
    user: commplatform

services:
  - type: web
    name: commplatform-api
    plan: free
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn config.wsgi:application --bind 0.0.0.0:$PORT"
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.prod
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        value: ".onrender.com"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://frontend-eta-lovat-10.vercel.app"
      - key: DATABASE_URL
        fromDatabase:
          name: commplatform-db
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: DJANGO_SUPERUSER_USERNAME
        value: admin
      - key: DJANGO_SUPERUSER_EMAIL
        value: admin@dynex.pt
      - key: DJANGO_SUPERUSER_PASSWORD
        value: admin123
