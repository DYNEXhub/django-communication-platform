[pytest]
DJANGO_SETTINGS_MODULE = config.settings.dev
python_files = tests.py test_*.py *_tests.py
python_classes = Test* *Tests
python_functions = test_*

# Test discovery patterns
testpaths = apps

# Coverage options
addopts =
    --verbose
    --strict-markers
    --tb=short
    --reuse-db
    --nomigrations
    --cov-report=term-missing:skip-covered
    --cov-report=html
    --cov-report=xml

# Markers for test organization
markers =
    unit: Unit tests
    integration: Integration tests
    slow: Slow running tests
    api: API endpoint tests
    celery: Celery task tests

# Ignore patterns
norecursedirs =
    .git
    .tox
    dist
    build
    *.egg
    venv
    env
    node_modules

# Coverage configuration
[coverage:run]
source = apps
omit =
    */migrations/*
    */tests/*
    */test_*.py
    */__pycache__/*
    */venv/*
    */env/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False

exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod
